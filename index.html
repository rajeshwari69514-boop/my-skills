<!DOCTYPE html>
<html>
<head>

<title>Rajeshwari</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background-image:url("https://images.unsplash.com/photo-1518770660439-4636190af475");
background-size:cover;
background-attachment:fixed;
font-family:Arial;
}

/* First Container */

.box1{
background:#6a4c93;
color:white;
padding:40px;
margin-top:60px;
border-radius:20px;
text-align:center;
box-shadow:0px 0px 15px black;
}

/* Second Container Fluid */

.box2{
background:linear-gradient(to right,#00c6ff,#0072ff);
padding:60px;
margin-top:60px;
color:white;
}

/* Profile Image */

.profile{
width:150px;
height:150px;
border-radius:50%;
border:4px solid white;
object-fit:cover;
margin-bottom:15px;
}

/* Skills */

.skill{
display:inline-block;
background:white;
color:black;
padding:10px 15px;
border-radius:20px;
margin:6px;
font-weight:bold;
}

/* Projects */

.project{
display:inline-block;
background:#ff9f1c;
color:white;
padding:10px 15px;
border-radius:20px;
margin:6px;
font-weight:bold;
}

.skill:hover{
transform:scale(1.1);
transition:0.3s;
}

.project:hover{
transform:scale(1.1);
transition:0.3s;
}

</style>

</head>

<body>

<!-- Container -->

<div class="container box1">

<img src="rajee.png" class="profile">

<h2>Rajeshwari C</h2>

<h5>B.Sc Artificial Intelligence & Machine Learning</h5>

<p>Interested in Artificial Intelligence, Machine Learning and Web Development.</p>

</div>


<!-- Container Fluid -->

<div class="container-fluid box2 text-center">

<h3>Technical Skills</h3>

<span class="skill">Python</span>
<span class="skill">HTML</span>
<span class="skill">CSS</span>
<span class="skill">Bootstrap</span>
<span class="skill">Machine Learning</span>

<br><br>

<h3>Projects</h3>

<span class="project">Login Form</span>
<span class="project">Student Information</span>
<span class="project">Portfolio</span>
<span class="project">Food Corner</span>
<span class="project">Gallery</span>

</div>

</body>
</html>
